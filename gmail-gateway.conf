log_format gmail_safe '$time_iso8601 remote=$remote_addr host=$host method=$request_method uri=$uri '
                      'status=$status upstream=$upstream_addr upstream_status=$upstream_status '
                      'request_time=$request_time upstream_time=$upstream_response_time';

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Never log query strings: OAuth code/state and probe tokens must not reach disk.
    access_log /var/log/gmail/mail_gateway_access.log gmail_safe;
    error_log /var/log/gmail/mail_gateway_error.log warn;

    # This endpoint is intentionally independent of the Telegram process.
    # It keeps the Coolify/Traefik route healthy while the bot starts.
    location = /gateway-healthz {
        access_log off;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        return 200 '{"ok":true,"service":"gmail-auth-gateway"}\n';
    }

    location = /healthz {
        proxy_pass http://chatgpt-scan-bot:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = /gmail/callback {
        proxy_pass http://chatgpt-scan-bot:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 65s;
        proxy_read_timeout 65s;
    }

    location / {
        default_type application/json;
        return 404 '{"ok":false,"error":"not_found"}\n';
    }
}
