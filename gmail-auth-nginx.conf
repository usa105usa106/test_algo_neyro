server {
    listen 80;
    server_name _;

    # Docker embedded DNS; variable proxy_pass avoids startup failure while the
    # bot container is still becoming healthy.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $bot_upstream chatgpt-scan-bot;

    location = /healthz {
        proxy_pass http://$bot_upstream:8080/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    location = /gmail/callback {
        proxy_pass http://$bot_upstream:8080/gmail/callback;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    location / {
        return 404;
    }
}
