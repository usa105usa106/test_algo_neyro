# Gmail callback and Telegram bot run in one container.
# Coolify/Traefik terminates HTTPS and forwards to container port 80.
services:
  chatgpt-scan-bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?}
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID:?}
      - DATA_ROOT=/app/storage
      - GMAIL_BACKUP_ROOT=/app/storage_backup
      - TELEGRAM_SEND_LIMIT_MB=${TELEGRAM_SEND_LIMIT_MB:-48}
      - DAYS_BACK=${DAYS_BACK:-30}
      - BASE_INTERVAL=${BASE_INTERVAL:-1m}
      - MEXC_BASE_URL=${MEXC_BASE_URL:-https://api.mexc.com}
      - MIN_COVERAGE_RATIO=${MIN_COVERAGE_RATIO:-0.80}
      - MIN_EFFECTIVE_DAYS=${MIN_EFFECTIVE_DAYS:-20}
      - TZ=${TZ:-UTC}

      # Coolify generates one public HTTPS URL and routes it directly to this
      # service's container port 80. The application reads the same URL.
      - SERVICE_URL_GMAILAUTH_80
      - GMAIL_AUTO_SEND_ARCHIVES=true
      - GMAIL_MAX_ATTACHMENT_MB=24
      - GMAIL_OAUTH_LISTEN_HOST=0.0.0.0
      - GMAIL_OAUTH_LISTEN_PORT=80
    expose:
      - "80"
    volumes:
      - type: bind
        source: /data/chatgpt-scan-bot-storage
        target: /app/storage
        is_directory: true
      - chatgpt_scan_storage:/app/storage_backup

volumes:
  chatgpt_scan_storage:
    name: chatgpt_scan_storage
