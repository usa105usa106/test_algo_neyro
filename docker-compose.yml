services:
  chatgpt-scan-bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:?}
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID:?}
      - DATA_ROOT=/app/storage
      - GMAIL_BACKUP_ROOT=/app/storage_backup
      - TELEGRAM_SEND_LIMIT_MB=${TELEGRAM_SEND_LIMIT_MB:-48}
      - DAYS_BACK=${DAYS_BACK:-30}
      - BASE_INTERVAL=${BASE_INTERVAL:-1m}
      - MEXC_BASE_URL=${MEXC_BASE_URL:-https://api.mexc.com}
      - MIN_COVERAGE_RATIO=${MIN_COVERAGE_RATIO:-0.80}
      - MIN_EFFECTIVE_DAYS=${MIN_EFFECTIVE_DAYS:-20}
      - TZ=${TZ:-UTC}

      # Explicit Coolify route to the stable nginx router on container port 80.
      # The router forwards only Gmail health/callback requests to the bot's
      # internal listener on 8080; users still receive a normal HTTPS URL.
      - SERVICE_URL_GMAIL-AUTH_80

      - GMAIL_AUTO_SEND_ARCHIVES=true
      - GMAIL_MAX_ATTACHMENT_MB=24
      - GMAIL_OAUTH_LISTEN_HOST=0.0.0.0
      - GMAIL_OAUTH_LISTEN_PORT=8080
    expose:
      - "80"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.build_opener(urllib.request.ProxyHandler({})).open('http://127.0.0.1/router-healthz', timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      # Primary storage is a fixed VPS directory and survives resource recreation.
      - type: bind
        source: /data/chatgpt-scan-bot-storage
        target: /app/storage
        is_directory: true
      # Redundant global Docker volume. Gmail credentials/token/ledger are mirrored
      # here and automatically restored if the primary directory is empty.
      - chatgpt_scan_storage:/app/storage_backup

volumes:
  chatgpt_scan_storage:
    name: chatgpt_scan_storage
