worker_processes 1;
pid /tmp/nginx.pid;
error_log /dev/stderr info;

events {
    worker_connections 256;
}

http {
    access_log /dev/stdout;
    server_tokens off;

    server {
        listen 80 default_server;
        server_name _;

        # Independent router readiness endpoint. Coolify/Traefik checks this
        # immediately, without waiting for Telegram initialization.
        location = /router-healthz {
            default_type application/json;
            add_header Cache-Control "no-store" always;
            return 200 '{"ok":true,"service":"gmail-router"}';
        }

        # Public Gmail probe must reach the bot process so its one-time token
        # can be confirmed in memory.
        location = /healthz {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 3s;
            proxy_read_timeout 30s;
        }

        # Google OAuth callback is handled by the same in-process manager.
        location = /gmail/callback {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 3s;
            proxy_read_timeout 90s;
        }

        location / {
            return 404;
        }
    }
}
